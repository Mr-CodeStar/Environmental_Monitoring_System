<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMonitor | Planetary Intelligence</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --bg: #000000;
            --panel: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border: rgba(255,255,255,0.15);
            --accent: #ffffff;
        }

        body { 
            margin: 0; display: flex; font-family: 'Inter', sans-serif; 
            height: 100vh; background: var(--bg); color: var(--text-main); 
        }
        
        /* COLORFUL DARK MAP - No more Grayscale! */
        #map { 
            flex: 3; height: 100%; z-index: 1; 
            /* Inverts white to black, but hue-rotate keeps greens green and blues blue */
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(110%);
        }
        
        #sidebar { 
            flex: 1.2; padding: 40px; background: var(--panel); 
            border-left: 1px solid var(--border); overflow-y: auto; 
            display: flex; flex-direction: column; z-index: 2;
            box-shadow: -10px 0 20px rgba(0,0,0,0.8);
        }

        h2 { 
            margin: 0 0 5px 0; font-weight: 700; font-size: 2rem; letter-spacing: -0.5px;
        }
        .subtitle { color: var(--text-muted); font-size: 1rem; margin-bottom: 30px; font-weight: 300; }
        
        .menu-buttons { display: flex; gap: 15px; margin-bottom: 30px; }
        
        .btn { 
            flex: 1; padding: 15px; border: 1px solid var(--border); border-radius: 4px;
            cursor: pointer; font-weight: 600; font-family: 'Inter', sans-serif;
            transition: all 0.3s ease; background: transparent; color: var(--text-muted);
            font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase;
        }
        .btn:hover { border-color: var(--text-main); color: var(--text-main); }
        .btn.active { background: var(--text-main); color: var(--bg); border-color: var(--text-main); }
        
        .stat-card { 
            background: #111; padding: 20px; margin-bottom: 15px; border-radius: 6px; 
            border: 1px solid var(--border); transition: 0.3s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .stat-card:hover { border-color: #666; transform: translateY(-2px); }
        .stat-card strong { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .stat-card span.val { color: var(--text-main); font-weight: 400; font-size: 1.25rem; }

        .loading-container {
            border: 1px solid var(--border); border-radius: 6px; padding: 30px 20px;
            text-align: center; margin-bottom: 20px;
        }
        .loading-text { font-size: 0.9rem; letter-spacing: 2px; color: var(--text-main); text-transform: uppercase; margin-bottom: 10px;}
        .progress-bar { width: 100%; height: 2px; background: #222; margin-top: 15px; position: relative; overflow: hidden; }
        .progress-bar::after {
            content: ""; position: absolute; top: 0; left: 0; height: 100%; width: 30%;
            background: var(--text-main); animation: slide 1.5s ease-in-out infinite;
        }
        @keyframes slide { 0% { left: -30%; } 100% { left: 100%; } }
        
        #btnPredict {
            display: none; margin-top: auto; padding: 20px; 
            background: var(--text-main); color: var(--bg); border: none;
            border-radius: 4px; font-size: 0.9rem; font-weight: 700; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        #btnPredict:hover { opacity: 0.8; transform: translateY(-2px); }
        
        .mode-hint { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; font-weight: 300;}
        .status-msg { text-align: center; color: var(--text-muted); margin-top: 40px; font-weight: 300; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div id="sidebar">
        <div>
            <h2>EcoMonitor</h2>
            <div class="subtitle">Planetary Intelligence UI</div>
        </div>

        <div class="menu-buttons">
            <button id="btnMonitor" class="btn active" onclick="setMode('monitor')">Live Monitor</button>
            <button id="btnDataset" class="btn" onclick="setMode('dataset')">Train AI Model</button>
        </div>
        
        <p id="mode-desc" class="mode-hint"><b>Mode: Live Feed</b><br>Click anywhere on the map to calculate real-time environmental metrics.</p>
        
        <div id="results"><p class="status-msg">Awaiting target coordinates.</p></div>
        
        <button id="btnPredict" onclick="runPrediction()">Generate 12-Month Forecast</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let currentMode = 'monitor';
        let satelliteLayer = null;
        let clickMarker = null; 
        const API_BASE = "http://127.0.0.1:8000"; 
        
        const map = L.map('map').setView([12.97, 77.59], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function cleanupMap() {
            if (satelliteLayer) { map.removeLayer(satelliteLayer); satelliteLayer = null; }
            if (clickMarker) { map.removeLayer(clickMarker); clickMarker = null; }
        }

        function setMode(mode) {
            currentMode = mode;
            cleanupMap();
            document.getElementById('btnMonitor').classList.toggle('active', mode === 'monitor');
            document.getElementById('btnDataset').classList.toggle('active', mode === 'dataset');
            
            const desc = document.getElementById('mode-desc');
            const predictBtn = document.getElementById('btnPredict');

            if (mode === 'monitor') {
                desc.innerHTML = "<b>Mode: Live Feed</b><br>Click anywhere on the map to calculate real-time environmental metrics.";
                predictBtn.style.display = 'none';
            } else {
                desc.innerHTML = "<b>Mode: Machine Learning</b><br>Click the map to extract a 10-year historical dataset for AI training.";
            }
            document.getElementById('results').innerHTML = '<p class="status-msg">Map cleared. Awaiting new target.</p>';
        }

        map.on('click', async function(e) {
            cleanupMap();
            const { lat, lng } = e.latlng;
            clickMarker = L.circleMarker([lat, lng], { radius: 6, color: '#fff', fillColor: '#fff', fillOpacity: 0.5, weight: 1 }).addTo(map);
            
            const resultsDiv = document.getElementById('results');
            
            if (currentMode === 'monitor') {
                resultsDiv.innerHTML = '<div class="loading-container"><div class="loading-text">Analyzing Imagery</div><div style="font-size:0.8rem; color:#888;">Fetching Sentinel & Landsat Data</div><div class="progress-bar"></div></div>';
                try {
                    const res = await fetch(`${API_BASE}/monitor?lat=${lat}&lon=${lng}`);
                    const json = await res.json();
                    resultsDiv.innerHTML = `
                        <div class="stat-card"><strong>NDVI (Vegetation)</strong><span class="val">${json.data.indices.NDVI.toFixed(4)}</span></div>
                        <div class="stat-card"><strong>NDWI (Moisture)</strong><span class="val">${json.data.indices.NDWI.toFixed(4)}</span></div>
                        <div class="stat-card"><strong>NDBI (Built-up)</strong><span class="val">${json.data.indices.NDBI.toFixed(4)}</span></div>
                        <div class="stat-card"><strong>LST (Temperature)</strong><span class="val">${json.data.indices.LST.toFixed(2)}°C</span></div>`;
                    satelliteLayer = L.tileLayer(json.data.tiles.ndvi_heatmap).addTo(map);
                } catch (err) { resultsDiv.innerHTML = '<p style="color: #ff4444; text-align:center;">Connection Error.</p>'; }
            } else {
                resultsDiv.innerHTML = '<div class="loading-container"><div class="loading-text">Extracting Timeline</div><div style="font-size:0.8rem; color:#888;">Compiling historical dataset</div><div class="progress-bar"></div></div>';
                try {
                    const res = await fetch(`${API_BASE}/dataset?lat=${lat}&lon=${lng}`);
                    const json = await res.json();
                    resultsDiv.innerHTML = `
                        <div class="stat-card" style="border-left: 2px solid #fff;">
                            <strong>Dataset Compiled</strong><span class="val">${json.total_records} Months</span>
                        </div>`;
                    document.getElementById('btnPredict').style.display = 'block';
                } catch (err) { resultsDiv.innerHTML = '<p style="color: #ff4444; text-align:center;">Failed to save dataset.</p>'; }
            }
        });

        async function runPrediction() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading-container"><div class="loading-text">Training Neural Models</div><div style="font-size:0.8rem; color:#888;">Evaluating Prophet, XGBoost, Random Forest</div><div class="progress-bar"></div></div>';
            try {
                const res = await fetch(`${API_BASE}/predict`);
                const json = await res.json();
                if (json.status === "success") {
                    resultsDiv.innerHTML = '<div class="stat-card" style="border: 1px solid #fff;"><strong>Model Optimized</strong><span class="val">Ready</span></div>';
                    openDashboard(json.data);
                }
            } catch (err) { resultsDiv.innerHTML = '<p style="color: #ff4444; text-align:center;">Engine Error.</p>'; }
        }

        function openDashboard(data) {
            const reportHtml = `<!DOCTYPE html>
<html>
<head>
    <title>Environmental Forecast Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"><\/script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
      body { margin: 0; display: flex; height: 100vh; font-family: 'Inter', sans-serif; background: #000; color: #fff; }
      .nav { display: flex; background: #0a0a0a; padding: 0 40px; border-bottom: 1px solid rgba(255,255,255,0.1); }
      .nav-item { padding: 25px 20px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; transition: 0.3s; font-weight: 600; font-size: 0.9rem; letter-spacing: 1px;}
      .nav-item:hover { color: #fff; }
      .nav-item.active { border-bottom-color: #fff; color: #fff; }
      
      .content-wrapper { display: flex; flex: 1; flex-direction: column; padding: 40px; overflow-y: auto; }
      
      .header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
      .title-group h1 { margin: 0 0 10px 0; font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; }
      .title-group p { margin: 0; color: #888; font-size: 1rem; max-width: 600px; line-height: 1.5; font-weight: 300; }
      
      .dl-btn { padding: 12px 24px; background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; cursor: pointer; transition: 0.3s; font-weight: 600; font-family: 'Inter'; letter-spacing: 1px; font-size: 0.8rem;}
      .dl-btn:hover { background: #fff; color: #000; }
      
      .metrics { display: flex; gap: 20px; margin-bottom: 30px; }
      .metric-box { background: #111; border: 1px solid rgba(255,255,255,0.1); padding: 15px 20px; border-radius: 6px; min-width: 150px; }
      .metric-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: 600; }
      .metric-value { font-size: 1.2rem; font-weight: 400; color: #fff; }
      
      .chart-container { flex: 1; min-height: 400px; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 20px; }
    </style>
</head>
<body>
    <div style="display:flex; flex-direction:column; width:100%; height:100%;">
        <div class="nav">
            <div class="nav-item active" onclick="view('NDVI', this)">NDVI (Vegetation)</div>
            <div class="nav-item" onclick="view('NDWI', this)">NDWI (Water)</div>
            <div class="nav-item" onclick="view('NDBI', this)">NDBI (Urban)</div>
            <div class="nav-item" onclick="view('LST', this)">LST (Temp)</div>
        </div>
        
        <div class="content-wrapper">
            <div class="header-row">
                <div class="title-group">
                    <h1 id="title">Normalized Difference Vegetation Index</h1>
                    <p id="desc">NDVI quantifies vegetation by measuring the difference between near-infrared (which vegetation strongly reflects) and red light (which vegetation absorbs). A higher value indicates healthier, denser plant life.</p>
                </div>
                <button class="dl-btn" onclick="dl()">Export Chart</button>
            </div>
            
            <div class="metrics">
                <div class="metric-box">
                    <div class="metric-label">Best AI Model</div>
                    <div class="metric-value" id="mb">--</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Error Rate (RMSE)</div>
                    <div class="metric-value" id="ab">--</div>
                </div>
            </div>
            
            <div class="chart-container"><canvas id="canvas"></canvas></div>
        </div>
    </div>

    <script>
        const store = ${JSON.stringify(data)};
        let chart = null;
        let activeIdx = 'NDVI';

        const descriptions = {
            'NDVI': { name: "Normalized Difference Vegetation Index", desc: "NDVI quantifies vegetation by measuring the difference between near-infrared and red light. Values range from -1 to 1. Higher values (0.4 to 0.9) indicate healthy, dense plant life, while lower values indicate barren rock, sand, or snow." },
            'NDWI': { name: "Normalized Difference Water Index", desc: "NDWI is used to monitor changes in water content. It uses green and near-infrared bands to highlight water bodies and enhance their presence while eliminating soil and terrestrial vegetation features." },
            'NDBI': { name: "Normalized Difference Built-up Index", desc: "NDBI maps urban areas and built-up land. It relies on the contrast between the shortwave-infrared and near-infrared bands. Rising NDBI forecasts usually indicate urbanization or deforestation in the selected area." },
            'LST': { name: "Land Surface Temperature", desc: "LST represents the radiative skin temperature of the land surface, measured in Celsius. It is heavily influenced by vegetation cover, soil moisture, and urban heat islands." }
        };

        function view(idx, el) {
            activeIdx = idx;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            
            const info = store[idx];
            document.getElementById('title').innerText = descriptions[idx].name;
            document.getElementById('desc').innerText = descriptions[idx].desc;
            document.getElementById('mb').innerText = info.model_used;
            document.getElementById('ab').innerHTML = info.accuracy_score.toFixed(4);

            const ctx = document.getElementById('canvas').getContext('2d');
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [...info.history.map(d => d.date), ...info.future.map(d => d.date)],
                    datasets: [
                        {
                            label: 'Historical Data',
                            data: info.history.map(d => d.value),
                            borderColor: '#888888',
                            backgroundColor: 'rgba(255, 255, 255, 0.05)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                            borderWidth: 1.5
                        },
                        {
                            label: 'AI Forecast (Next 12 Months)',
                            data: [...Array(info.history.length - 1).fill(null), info.history[info.history.length-1].value, ...info.future.map(d => d.value)],
                            borderColor: '#ffffff',
                            borderDash: [5, 5],
                            pointRadius: 4,
                            pointBackgroundColor: '#000',
                            pointBorderColor: '#fff',
                            fill: false,
                            tension: 0.3,
                            borderWidth: 2
                        }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    color: '#888', font: { family: "'Inter', sans-serif" },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888', maxTicksLimit: 12 } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888' } }
                    },
                    plugins: { 
                        legend: { position: 'bottom', labels: { color: '#fff', usePointStyle: true, padding: 20 } },
                        tooltip: { backgroundColor: '#111', titleColor: '#fff', bodyColor: '#fff', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1 }
                    },
                    interaction: { mode: 'index', intersect: false }
                }
            });
        }
        function dl() {
            const a = document.createElement('a');
            a.download = activeIdx + '_Forecast.png';
            a.href = document.getElementById('canvas').toDataURL('image/png');
            a.click();
        }
        view('NDVI', document.querySelector('.nav-item'));
    <\/script>
</body>
</html>`;
            const blob = new Blob([reportHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
